  openImportExercises(){
    const overlay=document.createElement('div');
    overlay.className='overlay';
    overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
    overlay.innerHTML=`
    <div class="sheet">
      <div class="sh-bar"></div>
      <div class="sh-title">Import Exercises</div>
      <div class="sh-body" style="padding-bottom:24px">
        <div style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:14px">
          Paste a JSON array of exercises. Each item needs at minimum: <code style="background:var(--surface3);padding:1px 5px;border-radius:4px">name</code>, <code style="background:var(--surface3);padding:1px 5px;border-radius:4px">muscle</code>.
        </div>
        <div class="fgrp">
          <label class="f-lbl">JSON</label>
          <textarea class="note-in" id="importJson" rows="8" placeholder='[{"name":"Cable Fly","muscle":"Chest","equipment":"Cable","level":"Beginner"}]' style="font-family:monospace;font-size:12px"></textarea>
        </div>
        <button class="btn btn-p btn-full" onclick="App._doImportExercises(this.closest('.overlay'))">Import</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
  },

  _doImportExercises(overlay){
    const raw=document.getElementById('importJson')?.value?.trim();
    try{
      const arr=JSON.parse(raw);
      if(!Array.isArray(arr))throw new Error('Not an array');
      const customs=DB.get('customExercises')||[];
      let added=0;
      for(const item of arr){
        if(!item.name||!item.muscle)continue;
        customs.push({
          id:Date.now()+added,name:item.name,origName:item.name,
          muscle:item.muscle,target:item.target||'Total',secondary:item.secondary||'',
          equipment:item.equipment||'Bodyweight',level:item.level||'Beginner',
          pp:'',modality:'FW',joint:'M',ulc:'Upper',notes:item.notes||'',custom:true,
        });
        added++;
      }
      DB.set('customExercises',customs);
      schedSync();
      overlay.remove();
      this.toast(`Imported ${added} exercise${added!==1?'s':''} ✓`);
      this.render();
    }catch(e){
      this.toast('Invalid JSON — check format');
    }
  },

  saveCustomExercise(overlay,editId){
    const name=document.getElementById('cxName')?.value?.trim();
    if(!name){this.toast('Enter a name');return;}
    const customs=DB.get('customExercises')||[];
    if(editId){
      // Edit existing custom exercise
      const idx=customs.findIndex(e=>e.id===editId);
      if(idx>=0){
        customs[idx]={...customs[idx],name,
          muscle:document.getElementById('cxMuscle')?.value||customs[idx].muscle,
          equipment:document.getElementById('cxEquip')?.value||customs[idx].equipment,
          level:document.getElementById('cxLevel')?.value||customs[idx].level,
          notes:document.getElementById('cxNotes')?.value||'',
        };
      }
    } else {
      // Also allow editing any exercise that's been overridden
      customs.push({
        id:Date.now(),name,origName:name,
        muscle:document.getElementById('cxMuscle')?.value||'Chest',
        target:'Total',secondary:'',
        equipment:document.getElementById('cxEquip')?.value||'Bodyweight',
        level:document.getElementById('cxLevel')?.value||'Beginner',
        pp:'',modality:'FW',joint:'M',ulc:'Upper',
        notes:document.getElementById('cxNotes')?.value||'',custom:true,
      });
    }
    DB.set('customExercises',customs);
    schedSync();
    overlay.remove();
    this.toast(editId?'Exercise updated ✓':'Exercise added ✓');
    this.render();
  },

  // ==================== EXERCISE PICKER SHEET ====================
  openExercisePicker(muscle){
    const all=allExercises().filter(e=>e.muscle===muscle);
    const history=(DB.get('workoutHistory')||[]).filter(w=>w.profileId===this.state.profileId);
    const usageMap={};
    for(const w of history)for(const e of(w.exercises||[]))usageMap[e.exId]=(usageMap[e.exId]||0)+1;
    const build=DB.get('buildWorkout')||{exercises:[]};
    const inBuild=new Set((build.exercises||[]).map(e=>e.exId));
    const meta=MUSCLE_META[muscle];
    const targets=[...new Set(all.map(e=>e.target).filter(Boolean))];
    let filterTarget='',filterEquip='',filterLevel='';

    const renderList=()=>{
      let shown=all;
      if(filterTarget)shown=shown.filter(e=>e.target===filterTarget);
      if(filterEquip)shown=shown.filter(e=>e.equipment===filterEquip);
      if(filterLevel)shown=shown.filter(e=>e.level===filterLevel);
      shown=[...shown].sort((a,b)=>(usageMap[a.id]||0)-(usageMap[b.id]||0));
      return shown.map(e=>`
        <div class="ex-card ${inBuild.has(e.id)?'sel':''}" onclick="App._togglePickerEx(${e.id},'${muscle}')">
          <div class="ex-ico" style="background:${(meta?.color||'#7c6dff')}22">${meta?.emoji||'💪'}</div>
          <div class="ex-info">
            <div class="ex-name">${e.name}</div>
            <div class="ex-meta">${e.target||''} · ${e.equipment||'Bodyweight'} · Used ${usageMap[e.id]||0}x</div>
          </div>
          <div style="text-align:right">
            ${levelPill(e.level)}
            ${inBuild.has(e.id)?`<div style="font-size:11px;color:var(--accent2);margin-top:2px">In workout</div>`:''}
          </div>
        </div>`).join('')||'<div class="empty" style="padding:24px"><div class="empty-t">No matches</div></div>';
    };

    const favs=DB.get('favorites')||[];
    const overlay=document.createElement('div');
    overlay.className='overlay';
    overlay.id='pickerOverlay';
    overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
    overlay.innerHTML=`
    <div class="sheet" style="max-height:95vh">
      <div class="sh-bar"></div>
      <div style="padding:14px 20px 8px;display:flex;align-items:center;gap:10px">
        <div style="font-size:22px">${meta?.emoji||'💪'}</div>
        <div style="font-size:18px;font-weight:700;flex:1">${muscle}</div>
        <button onclick="this.closest('.overlay').remove()" class="btn-g">Done</button>
      </div>
      <!-- Target (muscle sub-area) filters -->
      <div class="fsec"><div class="fsec-lbl">Target Area</div><div class="fsec-line"></div></div>
      <div class="fc">
        ${targets.map(t=>`<div class="fc-chip" onclick="App._pickerFilter('target','${t}')">${t}</div>`).join('')}
      </div>
      <!-- Equipment filters -->
      <div class="fsec"><div class="fsec-lbl">Equipment</div><div class="fsec-line"></div></div>
      <div class="fc">
        ${[...new Set(all.map(e=>e.equipment).filter(Boolean))].map(eq=>`<div class="fc-chip" onclick="App._pickerFilter('equipment','${eq}')">${eq}</div>`).join('')}
      </div>
      <!-- Level + fav filters -->
      <div class="fsec"><div class="fsec-lbl">Difficulty</div><div class="fsec-line"></div></div>
      <div class="fc" style="margin-bottom:4px">
        ${['Beginner','Intermediate','Advanced'].map(l=>`<div class="fc-chip" onclick="App._pickerFilter('level','${l}')">${l}</div>`).join('')}
        <div class="fc-chip" onclick="App._pickerFilter('favOnly','toggle')">⭐ Favs Only</div>
        <div class="fc-chip" onclick="App._pickerFilter('newOnly','toggle')">✨ Never Tried</div>
      </div>
      <!-- List -->
      <div id="pickerList" style="padding:0 16px;padding-bottom:20px">
        ${renderList()}
      </div>
    </div>`;
    document.body.appendChild(overlay);
    this._pickerFilterTarget=filterTarget;
    this._pickerFilterEquip=filterEquip;
    this._pickerFilterLevel=filterLevel;
    this._pickerFavOnly=false;
    this._pickerNewOnly=false;
    this._pickerMuscle=muscle;
    this._pickerAll=all;
    this._pickerUsage=usageMap;
  },

  _pickerFilter(type,val){
    if(type==='target')this._pickerFilterTarget=this._pickerFilterTarget===val?'':val;
    else if(type==='equipment')this._pickerFilterEquip=this._pickerFilterEquip===val?'':val;
    else if(type==='level')this._pickerFilterLevel=this._pickerFilterLevel===val?'':val;
    else if(type==='favOnly')this._pickerFavOnly=!this._pickerFavOnly;
    else if(type==='newOnly')this._pickerNewOnly=!this._pickerNewOnly;
    // Update chip styles
    document.querySelectorAll('#pickerOverlay .fc-chip').forEach(chip=>{
      const t=chip.textContent.trim();
      const on=t===this._pickerFilterTarget||t===this._pickerFilterEquip||
        t===this._pickerFilterLevel||
        (t.includes('Favs')&&this._pickerFavOnly)||
        (t.includes('Never')&&this._pickerNewOnly);
      chip.classList.toggle('on',on);
    });
    this._pickerRenderList();
  },
  _pickerRenderList(){
    const build=DB.get('buildWorkout')||{exercises:[]};
    const inBuild=new Set((build.exercises||[]).map(e=>e.exId));
    const favs=DB.get('favorites')||[];
    const usedIds=new Set((DB.get('workoutHistory')||[]).filter(w=>w.profileId===this.state.profileId).flatMap(w=>(w.exercises||[]).map(e=>e.exId)));
    const meta=MUSCLE_META[this._pickerMuscle];
    let shown=this._pickerAll;
    if(this._pickerFilterTarget)shown=shown.filter(e=>e.target===this._pickerFilterTarget);
    if(this._pickerFilterEquip)shown=shown.filter(e=>e.equipment===this._pickerFilterEquip);
    if(this._pickerFilterLevel)shown=shown.filter(e=>e.level===this._pickerFilterLevel);
    if(this._pickerFavOnly)shown=shown.filter(e=>favs.includes(e.id));
    if(this._pickerNewOnly)shown=shown.filter(e=>!usedIds.has(e.id));
    shown=[...shown].sort((a,b)=>(this._pickerUsage[a.id]||0)-(this._pickerUsage[b.id]||0));
    const el=document.getElementById('pickerList');
    if(!el)return;
    el.innerHTML=shown.map(e=>`
      <div class="ex-card ${inBuild.has(e.id)?'sel':''}" onclick="App._togglePickerEx(${e.id},'${this._pickerMuscle}')">
        <div class="ex-ico" style="background:${(meta?.color||'#7c6dff')}22">${meta?.emoji||'💪'}</div>

  deleteProfile(id){
    const profiles=DB.get('profiles')||[];
    if(profiles.length<=1){this.toast('Cannot delete the only profile');return;}
    const prof=profiles.find(p=>p.id===id);
    if(!confirm(`Delete profile "${prof?.name}"? Their workout history will also be deleted.`))return;
    const newProfiles=profiles.filter(p=>p.id!==id);
    DB.set('profiles',newProfiles);
    let history=DB.get('workoutHistory')||[];
    history=history.filter(w=>w.profileId!==id);
    DB.set('workoutHistory',history);
    if(this.state.profileId===id){
      this.state.profileId=newProfiles[0].id;
      DB.set('activeProfileId',this.state.profileId);
    }
    schedSync();
    this.toast('Profile deleted');
    this.render();
  },

    this.state.profileId=id;
    DB.set('activeProfileId',id);
    this.render();

  async _installUpdate(url){
    const btn=document.getElementById('installUpdateBtn');
    if(btn){btn.textContent='Downloading…';btn.disabled=true;}
    try{
      if(!url)throw new Error('No URL');
      const res=await fetch(url+'?_='+Date.now());
      if(!res.ok)throw new Error('Fetch failed: '+res.status);
      const html=await res.text();
      if(html.length<10000)throw new Error('File too small, may be invalid');
      // Write to a blob URL and navigate, preserving localStorage data
      const blob=new Blob([html],{type:'text/html'});
      const blobUrl=URL.createObjectURL(blob);
      // Open in same window — localStorage persists across same-origin blobs
      if(btn){btn.textContent='Installing…';}
      setTimeout(()=>{window.location.href=blobUrl;},200);
    }catch(e){
      if(btn){btn.textContent='Install Update Now';btn.disabled=false;}
      // Fallback: direct download so user can replace the file manually
      this.toast('Auto-install failed — downloading file instead');
      const latest=this.state.updateAvailable;
      if(latest?.url){
        const a=document.createElement('a');
        a.href=latest.url+'?_='+Date.now();
        a.download='liftlab.html';
        a.click();
      }
    }
  },

  _toggleBodyMuscle(el,muscle,event){
    event.stopPropagation();

      document.querySelectorAll(`[data-muscle="${muscle}"]`).forEach(e=>e.classList.remove('hi'));
    } else {
      this._bodyMapSelected.add(muscle);
      document.querySelectorAll(`[data-muscle="${muscle}"]`).forEach(e=>e.classList.add('hi'));
    }
    const selDiv=document.getElementById('selectedMuscles');
    const noMsg=document.getElementById('noSelMsg');

    // Then open pickers
    setTimeout(()=>{

  _doSavePlan(overlay,overwriteIdx){
    const build=DB.get('buildWorkout')||{};
    const name=document.getElementById('planName')?.value?.trim()||build.name||'My Plan';
    const emoji=document.getElementById('planEmoji')?.value||'💪';
    // Collect selected folder tags
    const selectedTags=[...document.querySelectorAll('#folderTagsWrap [data-tag]')]
      .filter(el=>el.style.background.includes('accent')||el.classList.contains('on'))
      .map(el=>el.dataset.tag);
    const newTag=(document.getElementById('planFolderNew')?.value||'').trim();
    if(newTag&&!selectedTags.includes(newTag))selectedTags.push(newTag);
    const folder=selectedTags[0]||null; // backward compat
    const plan={
      id:uuid(),name,emoji,folder:folder||null,folders:selectedTags.length?selectedTags:[folder].filter(Boolean),
      exercises:(build.exercises||[]).map(e=>({exId:e.exId,ssGroup:e.ssGroup||null,sets:Array.from({length:(e.sets||[{},{},{}]).length},()=>({weight:'',reps:'',completed:false,note:''}))})),
      muscles:[...new Set((build.exercises||[]).map(e=>{const ex=getExercise(e.exId);return ex?.muscle}).filter(Boolean))],
      savedAt:new Date().toISOString(),custom:true,
    };
    const plans=DB.get('savedPlans')||[];
    // Check for duplicate name
    const dupIdx=plans.findIndex(p=>p.name.toLowerCase()===name.toLowerCase());
    if(dupIdx>=0&&overwriteIdx===undefined){
      // Ask user to overwrite or save new
      if(!confirm(`A plan named "${name}" already exists. Overwrite it?`)){
        plan.name=name+' 2';
      } else {
        plans[dupIdx]={...plan,id:plans[dupIdx].id};
        DB.set('savedPlans',plans);
        schedSync();
        overlay.remove();
        this.toast('Plan updated ✓');
        return;
      }
    } else if(overwriteIdx!==undefined&&overwriteIdx>=0){
      plans[overwriteIdx]={...plan,id:plans[overwriteIdx].id};
      DB.set('savedPlans',plans);
      schedSync();
      overlay.remove();
      this.toast('Plan updated ✓');
      return;
    }
    plans.push(plan);
    DB.set('savedPlans',plans);
    schedSync();
    overlay.remove();
    this.toast('Plan saved! ✓');
  },

  _calcPlates(){
    const target=parseFloat(document.getElementById('plateTarget')?.value)||0;
    const bar=parseFloat(document.getElementById('plateBar')?.value)||45;
    const el=document.getElementById('plateResult');
    if(!el)return;
    const PLATES=[{w:45,c:'#ef4444'},{w:35,c:'#3b82f6'},{w:25,c:'#f59e0b'},{w:10,c:'#22c55e'},{w:5,c:'#a78bfa'},{w:2.5,c:'#ec4899'},{w:1.25,c:'#94a3b8'}];
    if(target<bar){el.innerHTML=`<div style="color:var(--red);font-size:13px">Target must be ≥ bar weight (${bar} lb)</div>`;return;}
    let rem=(target-bar)/2,used=[];
    for(const p of PLATES)while(rem>=p.w-.001){used.push(p);rem=Math.round((rem-p.w)*1000)/1000;}
    if(rem>.1){el.innerHTML=`<div style="color:var(--amber);font-size:13px">Cannot make ${target} lb exactly. Closest: ${(target-rem*2).toFixed(1)} lb</div>`;return;}
    const pViz=used.map(p=>{
      const h=Math.max(18,Math.min(52,p.w*.9+14));
      return`<div class="plate" style="height:${h}px;width:14px;background:${p.c};margin:0 1px">${p.w}</div>`;
    }).join('');
    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:center;gap:0;margin:8px 0 12px;overflow-x:auto;padding:4px 0">
        <div style="width:28px;height:7px;background:var(--surface3);border-radius:2px"></div>

        <div style="width:8px;height:22px;background:var(--surface3);border-radius:3px 0 0 3px"></div>
        <div style="width:8px;height:22px;background:var(--surface3);border-radius:0 3px 3px 0"></div>
        <div style="display:flex;align-items:center">${pViz}</div>
        <div style="width:28px;height:7px;background:var(--surface3);border-radius:2px"></div>
      </div>
      <div style="font-size:12px;color:var(--t2);text-align:center">Each side: ${used.map(p=>p.w+'lb').join(' + ')||'none'}</div>
      <div style="font-size:11px;color:var(--t3);text-align:center;margin-top:2px">Bar: ${bar} lb · Total: ${target} lb</div>`;
  },

  computeBadges(){
    const history=(DB.get('workoutHistory')||[]).filter(w=>w.profileId===this.state.profileId);

    const totalSets=history.reduce((s,w)=>s+(w.exercises||[]).reduce((ss,e)=>ss+(e.sets||[]).filter(s=>s.completed).length,0),0);
    const streak=getWorkoutStreak();
    const exUsed=new Set(history.flatMap(w=>(w.exercises||[]).map(e=>e.exId))).size;
    const pbMap={};
    for(const w of history)for(const e of(w.exercises||[]))for(const s of(e.sets||[]))if(s.completed&&s.weight){const v=s.weight*(s.reps||1);if(!pbMap[e.exId]||v>pbMap[e.exId])pbMap[e.exId]=v;}
    const pbs=Object.keys(pbMap).length;
    const heaviest=Math.max(0,...history.flatMap(w=>(w.exercises||[]).flatMap(e=>(e.sets||[]).filter(s=>s.completed&&s.weight).map(s=>s.weight))));
    return[

  renderCalendar(m,hT,hB){
    hT.textContent='Calendar';
    hB.innerHTML=`<button onclick="App.nav('history')" class="btn-g">History</button>`;
    const history=(DB.get('workoutHistory')||[]).filter(w=>w.profileId===this.state.profileId);
    const dateCounts={};
    for(const w of history)dateCounts[w.date]=(dateCounts[w.date]||0)+1;
    const now=new Date();
    const months=[];
    for(let mi=5;mi>=0;mi--){
      const d=new Date(now.getFullYear(),now.getMonth()-mi,1);
      months.push({year:d.getFullYear(),month:d.getMonth()});
    }
    const DOW=['S','M','T','W','T','F','S'];
    const MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const todayStr=now.toISOString().split('T')[0];
    const totalW=history.length;
    const streak=getWorkoutStreak();
    const activeDays=Object.keys(dateCounts).length;
    const best=Math.max(0,...Object.values(dateCounts));
    m.innerHTML=`
    <div style="padding:16px">
      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val">${totalW}</div><div class="stat-lbl">Total Workouts</div></div>
        <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-lbl">Current Streak</div></div>
        <div class="stat-card"><div class="stat-val">${activeDays}</div><div class="stat-lbl">Active Days</div></div>
        <div class="stat-card"><div class="stat-val">${best}</div><div class="stat-lbl">Most in a Day</div></div>
      </div>
      ${months.map(({year,month})=>{
        const firstDay=new Date(year,month,1).getDay();
        const daysInMonth=new Date(year,month+1,0).getDate();
        const cells=[];
        for(let i=0;i<firstDay;i++)cells.push({empty:true});
        for(let d=1;d<=daysInMonth;d++){
          const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const cnt=dateCounts[ds]||0;
          const cls=cnt===0?'rest':cnt===1?'w1':cnt===2?'w2':cnt===3?'w3':'w4';
          cells.push({d,ds,cnt,cls,today:ds===todayStr});
        }
        return`
        <div style="margin-bottom:24px">
          <div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:8px">${MNAMES[month]} ${year}</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
            ${DOW.map(d=>`<div style="text-align:center;font-size:9px;font-weight:600;color:var(--t3);padding:2px 0">${d}</div>`).join('')}
          </div>
          <div class="cal-grid" style="gap:3px">
            ${cells.map(cell=>cell.empty?`<div class="cal-day empty"></div>`:
              `<div class="cal-day ${cell.cls}${cell.today?' today':''}" onclick="App._calDayClick('${cell.ds}')" title="${cell.cnt} workout${cell.cnt!==1?'s':''}">${cell.d}</div>`
            ).join('')}
          </div>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px;padding-bottom:8px">
        <span style="font-size:11px;color:var(--t3)">Less</span>
        ${['rest','w1','w2','w3','w4'].map(cls=>`<div style="width:16px;height:16px;border-radius:3px" class="cal-day ${cls}"></div>`).join('')}
        <span style="font-size:11px;color:var(--t3)">More</span>
      </div>
    </div>`;
  },

  _calDayClick(dateStr){
    const history=(DB.get('workoutHistory')||[]).filter(w=>w.date===dateStr&&w.profileId===this.state.profileId);
    if(!history.length)return;
    if(history.length===1){this.viewWorkout(history[0].id);return;}
    const overlay=document.createElement('div');
    overlay.className='overlay';
    overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
    overlay.innerHTML=`<div class="sheet"><div class="sh-bar"></div><div class="sh-title">${fmtDate(dateStr)}</div><div class="sh-body" style="padding-bottom:20px">
      ${history.map(w=>`<div class="ri" style="cursor:pointer" onclick="App.viewWorkout('${w.id}');this.closest('.overlay').remove()">
        <div class="ri-c"><div class="ri-t">${w.name||'Workout'}</div><div class="ri-s">${(w.exercises||[]).length} exercises</div></div><div class="ri-r">›</div></div>`).join('')}
    </div></div>`;
    document.body.appendChild(overlay);
  },

  // ==================== FEATURE: VOLUME CHARTS ====================
  renderCharts(m,hT,hB){
    hT.textContent='Progress Charts';
    hB.innerHTML='';
    const history=(DB.get('workoutHistory')||[]).filter(w=>w.profileId===this.state.profileId);
    const exMap={};
    for(const w of [...history].sort((a,b)=>a.date.localeCompare(b.date))){
      for(const e of(w.exercises||[])){
        const doneSets=(e.sets||[]).filter(s=>s.completed&&s.weight);
        if(!doneSets.length)continue;
        if(!exMap[e.exId])exMap[e.exId]=[];
        exMap[e.exId].push({
          date:w.date,
          maxW:Math.max(...doneSets.map(s=>s.weight)),
          totalVol:doneSets.reduce((a,s)=>a+s.weight*(s.reps||1),0),
          sets:doneSets.length
        });
      }
    }
    const exIds=Object.keys(exMap).sort((a,b)=>exMap[b].length-exMap[a].length).slice(0,30);
    if(!exIds.length){
      m.innerHTML=`<div class="empty" style="margin-top:60px"><span class="empty-ico">📈</span><div class="empty-t">No data yet</div><div class="empty-s">Complete workouts to see progress charts</div></div>`;
      return;
    }
    this._chartState={exId:parseInt(exIds[0]),metric:'maxW'};
    this._chartExMap=exMap;

    m.innerHTML=`
    <div style="padding:16px">
      <div class="fgrp">
        <label class="f-lbl">Exercise</label>
        <select id="chartExSel" onchange="App._chartSelEx(this.value)">
          ${exIds.map(id=>{const ex=getExercise(parseInt(id));return ex?`<option value="${id}">${ex.name}</option>`:''}).join('')}
        </select>
      </div>
      <div class="seg" style="margin-bottom:16px">
        <button class="seg-b on" id="cm-maxW" onclick="App._chartMetric('maxW',this)">Max Weight</button>
        <button class="seg-b" id="cm-totalVol" onclick="App._chartMetric('totalVol',this)">Volume</button>
        <button class="seg-b" id="cm-sets" onclick="App._chartMetric('sets',this)">Sets Done</button>
      </div>
      <div class="card" style="padding:16px;min-height:180px" id="chartArea"></div>
      <div class="section-lbl" style="padding-top:16px">Session Log</div>
      <div id="chartHistTable"></div>
    </div>`;
    requestAnimationFrame(()=>{this._renderChart();this._renderChartHistTable();});
  },

  _renderChart(){
    const el=document.getElementById('chartArea');
    if(!el||!this._chartState)return;
    const data=(this._chartExMap[this._chartState.exId]||[]);
    if(!data.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--t3)">No data</div>';return;}
    const metric=this._chartState.metric;
    const vals=data.map(d=>d[metric]);
    const maxV=Math.max(...vals)||1;
    const minV=Math.min(...vals);
    const recent=data[data.length-1];
    const prev=data.length>1?data[data.length-2]:null;
    const trendUp=prev?recent[metric]>=prev[metric]:null;
    const trendColor=trendUp===null?'var(--t3)':trendUp?'var(--green)':'var(--red)';
    const unit=metric==='maxW'?'lbs':metric==='sets'?'sets':'vol';
    const W=300,H=100,n=data.length;
    const bW=Math.max(4,Math.min(20,Math.floor((W-n*2)/n)));
    const gap=Math.max(2,(W-n*bW)/(n+1));
    const pts=data.map((d,i)=>({x:gap+i*(bW+gap)+bW/2,y:H-Math.round(((d[metric]-minV)/(maxV-minV||1))*80+10)}));
    el.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">
        <div>
          <span style="font-size:26px;font-weight:700;letter-spacing:-1px">${typeof recent[metric]==='number'?recent[metric].toFixed(metric==='sets'?0:1):'-'}</span>
          <span style="font-size:13px;color:var(--t3);margin-left:4px">${unit}</span>
        </div>
        ${trendUp!==null?`<div style="font-size:14px;font-weight:700;color:${trendColor}">${trendUp?'↑ Up':'↓ Down'}</div>`:''}
      </div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" class="vchart-svg" style="overflow:visible">
        ${data.map((d,i)=>{
          const x=gap+i*(bW+gap);
          const bh=Math.max(3,Math.round(((d[metric]-minV)/(maxV-minV||1))*80+10));
          const isLast=i===n-1;
          return`<rect x="${x}" y="${H-bh}" width="${bW}" height="${bh}" rx="2"
            fill="${isLast?'var(--accent)':'var(--accent-dim)'}" opacity="${isLast?1:.75}"/>
            ${isLast?`<text x="${x+bW/2}" y="${H-bh-4}" text-anchor="middle" font-size="8" fill="var(--accent2)">${d[metric].toFixed(0)}</text>`:''}`;
        }).join('')}
        ${pts.length>1?`<polyline points="${pts.map(p=>p.x+','+p.y).join(' ')}" fill="none" stroke="var(--teal)" stroke-width="1.5" stroke-dasharray="3,2" opacity=".65"/>`:''}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:4px">
        <span>${fmtDate(data[0].date)}</span>
        <span>${n} sessions</span>
        <span>${fmtDate(data[n-1].date)}</span>
      </div>`;
  },
  _chartSelEx(val){if(this._chartState){this._chartState.exId=parseInt(val);this._renderChart();this._renderChartHistTable();}},
  _chartMetric(metric,btn){
    if(!this._chartState)return;
    this._chartState.metric=metric;
    document.querySelectorAll('[id^="cm-"]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    this._renderChart();
  },
  _renderChartHistTable(){
    const el=document.getElementById('chartHistTable');
    if(!el||!this._chartState)return;
    const data=(this._chartExMap[this._chartState.exId]||[]).slice().reverse().slice(0,10);
    el.innerHTML=data.map(d=>`
      <div class="hist-e">
        <div class="hist-d">${fmtDate(d.date)}</div>
        <div class="hist-v">${d.maxW} lbs max · ${Math.round(d.totalVol)} vol · ${d.sets} sets</div>
      </div>`).join('')||'<div style="padding:12px;color:var(--t3);font-size:13px">No data</div>';
  },

  // ==================== SMART REPS AI ====================
  renderSmartReps(m,hT,hB){
    hT.textContent='Smart Reps AI';
    hB.innerHTML='';
    if(!this._aiMessages)this._aiMessages=[];
    const prof=((DB.get('profiles')||[]).find(p=>p.id===this.state.profileId)||{});
    const history=(DB.get('workoutHistory')||[]).filter(w=>w.profileId===this.state.profileId);
    const pbs={};
    for(const w of history)for(const e of(w.exercises||[]))for(const s of(e.sets||[])){
      if(s.completed&&s.weight){const ex=getExercise(e.exId);if(ex){const v=s.weight*(s.reps||1);if(!pbs[ex.name]||v>pbs[ex.name].vol)pbs[ex.name]={weight:s.weight,reps:s.reps,vol:v};}}
    }
    const pbSummary=Object.entries(pbs).slice(0,15).map(([n,v])=>`${n}: ${v.weight}lbs x ${v.reps}`).join(', ');
    this._aiContext=`You are a helpful gym coach inside LiftLab. The user is ${prof.name||'a lifter'} who has completed ${history.length} workouts. Their personal bests: ${pbSummary||'no history yet'}. Give specific, actionable advice about weights, reps, and form. Keep responses to 2-4 sentences. Reference their actual history when recommending weights.`;
    m.innerHTML=`
    <div style="display:flex;flex-direction:column;height:calc(100vh - var(--hdr-h) - var(--safe-t) - var(--nav-h) - env(safe-area-inset-bottom,0px))">
      <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px" id="aiChat">
        ${this._aiMessages.length===0?`
        <div style="text-align:center;padding:32px 16px">
          <div style="font-size:44px;margin-bottom:12px">🧠</div>
          <div style="font-size:17px;font-weight:700;margin-bottom:8px">Smart Reps</div>
          <div style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:8px">Ask anything about weights, reps, form, or progression — personalized to your history.</div>
          <div style="background:var(--surface2);border:.5px solid var(--border);border-radius:10px;padding:10px 12px;text-align:left;margin-bottom:16px;font-size:12px;color:var(--t2);line-height:1.6">
            <strong>How it works:</strong> This calls the Claude AI API directly. No Claude account needed — no free-tier limits or login. Your workout history is sent to generate a personalized response. Anthropic does not store your data beyond the request.
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;text-align:left">
            ${['What weight should I use for bench press today?','How many reps should I do for muscle growth?','What back exercises should I do?','Am I progressing well on my lifts?'].map(q=>`
              <button onclick="App._aiSend('${q}')" style="background:var(--surface2);border:.5px solid var(--border2);border-radius:12px;padding:11px 14px;text-align:left;font-size:13px;color:var(--t1);cursor:pointer;font-family:inherit;transition:background .15s">${q}</button>
            `).join('')}
          </div>
        </div>`
        :this._aiMessages.map(msg=>`<div class="ai-msg ${msg.role==='user'?'user':'ai'}${msg.thinking?' thinking':''}">${msg.content}</div>`).join('')}
      </div>
      <div style="flex-shrink:0;padding:8px 16px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));border-top:.5px solid var(--border);display:flex;gap:8px;background:var(--glass-nav);backdrop-filter:blur(16px)">
        <input type="text" id="aiInput" placeholder="Ask about weights, reps, form..." style="flex:1" onkeydown="if(event.key==='Enter'&&this.value.trim()){App._aiSend(this.value);}">
        <button onclick="App._aiSend(document.getElementById('aiInput')?.value)" class="btn btn-p btn-sm">Send</button>
      </div>
    </div>`;
    requestAnimationFrame(()=>{const el=document.getElementById('aiChat');if(el)el.scrollTop=el.scrollHeight;});
  },
  async _aiSend(msg){
    if(!msg||!msg.trim())return;
    const input=document.getElementById('aiInput');
    if(input){input.value='';input.blur();}
    if(!this._aiMessages)this._aiMessages=[];
    this._aiMessages.push({role:'user',content:msg.trim()});
    this._aiMessages.push({role:'assistant',content:'Thinking...', thinking:true});
    this.renderSmartReps(document.getElementById('main'),document.getElementById('hT'),document.getElementById('hB'));
    try{
      const msgs=this._aiMessages.filter(m=>!m.thinking).map(m=>({role:m.role,content:m.content}));
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:this._aiContext,messages:msgs})
      });
      const data=await res.json();
      const reply=data.content?.[0]?.text||'Sorry, could not get a response.';
      this._aiMessages.pop();
      this._aiMessages.push({role:'assistant',content:reply});
    }catch(e){
      this._aiMessages.pop();
      this._aiMessages.push({role:'assistant',content:'Could not connect to AI. Check your internet connection and try again.'});
    }
    this.renderSmartReps(document.getElementById('main'),document.getElementById('hT'),document.getElementById('hB'));
  },

  // ==================== TOUCH DRAG TO REORDER + SWIPE TO DELETE ====================
  _initDragDrop(){
    this._initSwipeToDelete();
  },
  _touchDragStart(e,srcIdx){
    e.stopPropagation();
    const touch=e.touches[0];
    // Find the card element
    const card=document.getElementById(`bex-wrap-${srcIdx}`);
    if(!card)return;
    const rect=card.getBoundingClientRect();
    // Create ghost
    const ghost=card.cloneNode(true);
    ghost.id='drag-ghost';
    ghost.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;pointer-events:none;z-index:999;transform:scale(1.02);box-shadow:0 12px 40px rgba(0,0,0,.5);border-radius:14px;transition:none`;
    document.body.appendChild(ghost);
    card.style.opacity='0.3';
    let currentIdx=srcIdx;
    const onMove=ev=>{
      const t=ev.touches[0];
      ghost.style.top=(t.clientY-(rect.height/2))+'px';
      ghost.style.left=rect.left+'px';
      // Find which card we're over
      document.querySelectorAll('[data-drag-idx]').forEach(el=>{
        const r=el.getBoundingClientRect();
        const mid=r.top+r.height/2;
        const idx=parseInt(el.dataset.dragIdx);
        el.style.borderTop=(t.clientY>mid&&idx===currentIdx+1)?'2px solid var(--accent)':'';
        el.style.borderBottom=(t.clientY<mid&&idx===currentIdx-1)?'2px solid var(--accent)':'';
        if(t.clientY>=r.top&&t.clientY<=r.top+r.height&&idx!==srcIdx){
          currentIdx=idx;
        }
      });
    };
    const onEnd=()=>{
      ghost.remove();
      card.style.opacity='';
      document.querySelectorAll('[data-drag-idx]').forEach(el=>{el.style.borderTop='';el.style.borderBottom='';});
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('touchend',onEnd);
      if(currentIdx!==srcIdx){
        const build=DB.get('buildWorkout')||{exercises:[]};
        const arr=build.exercises;
        const item=arr.splice(srcIdx,1)[0];
        arr.splice(currentIdx,0,item);
        DB.set('buildWorkout',build);
        App._refreshBuild();
      }
    };
    document.addEventListener('touchmove',onMove,{passive:true});
    document.addEventListener('touchend',onEnd);
  },
  _onDragStart(e,i){this.state.dragSrc=i;e.dataTransfer&&(e.dataTransfer.effectAllowed='move');},
  _onDragOver(e,i){e.preventDefault&&e.preventDefault();},
  _onDrop(e,i){
    e.preventDefault&&e.preventDefault();
    if(this.state.dragSrc===null||this.state.dragSrc===i)return;
    const build=DB.get('buildWorkout')||{exercises:[]};
    const arr=build.exercises;
    const item=arr.splice(this.state.dragSrc,1)[0];
    arr.splice(i,0,item);
    DB.set('buildWorkout',build);
    this.state.dragSrc=null;
    this._refreshBuild();
  },
  _initSwipeToDelete(){
    document.querySelectorAll('.swipeable').forEach(wrap=>{
      const inner=wrap.querySelector('.swipe-inner');
      if(!inner||inner._swipeInit)return;
      inner._swipeInit=true;
      let startX=0,startY=0,curX=0,swiping=false,blocked=false;
      const THRESHOLD=80;
      inner.addEventListener('touchstart',e=>{
        startX=e.touches[0].clientX;startY=e.touches[0].clientY;curX=0;swiping=false;blocked=false;
      },{passive:true});
      inner.addEventListener('touchmove',e=>{
        const dx=e.touches[0].clientX-startX;
        const dy=e.touches[0].clientY-startY;
        if(!swiping&&!blocked){
          if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>6){swiping=true;}
          else if(Math.abs(dy)>6){blocked=true;}
        }
        if(!swiping)return;
        curX=Math.min(0,dx); // only swipe left
        inner.classList.add('no-trans');
        inner.style.transform=`translateX(${curX}px)`;
      },{passive:true});
      inner.addEventListener('touchend',()=>{
        inner.classList.remove('no-trans');
        if(swiping&&curX<-THRESHOLD){
          inner.style.transform='translateX(-100%)';
          inner.style.opacity='0';
          setTimeout(()=>{
            // find index from id
            const idx=parseInt(wrap.id.replace('bex-wrap-',''));
            if(!isNaN(idx))App.removeFromBuild(idx);
          },200);
        } else {
          inner.style.transform='';
        }
        swiping=false;curX=0;
      });
    });
  },
  _onDragStart(e,i){this.state.dragSrc=i;e.dataTransfer.effectAllowed='move';},
  _onDragOver(e,i){e.preventDefault();e.dataTransfer.dropEffect='move';},
  _onDrop(e,i){
    e.preventDefault();
    if(this.state.dragSrc===null||this.state.dragSrc===i)return;
    const build=DB.get('buildWorkout')||{exercises:[]};
    const arr=build.exercises;
    const item=arr.splice(this.state.dragSrc,1)[0];
    arr.splice(i,0,item);
    build.exercises=arr;
    DB.set('buildWorkout',build);
    this.state.dragSrc=null;
    this.render();
  },

  // ==================== TOAST ====================
  toast(msg){
    const existing=document.querySelector('.toast');
    if(existing)existing.remove();
    const el=document.createElement('div');
    el.className='toast';
    el.textContent=msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2800);
  },
};

// ---- Init ----
document.addEventListener('DOMContentLoaded',()=>App.init());

</script>
</body>
</html>
